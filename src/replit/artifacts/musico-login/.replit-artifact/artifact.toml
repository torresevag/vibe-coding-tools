kind = "web"
previewPath = "/"
title = "MusiConnect - Login"
version = "1.0.0"
id = "artifacts/musico-login"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21654
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/musico-login run dev"

[services.env]
PORT = "21654"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/musico-login", "run", "build"]
publicDir = "artifacts/musico-login/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
