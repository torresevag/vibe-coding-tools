<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SUBFREQ — Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="noise"></div>

  <main class="container">
    <header>
      <div class="logo">SUBFREQ</div>
      <p class="tagline">la red del underground sonoro</p>
    </header>

    <form class="login-form" id="loginForm">
      <div class="field">
        <label for="email">email / alias</label>
        <input type="text" id="email" placeholder="tu@correo.com" autocomplete="off" />
      </div>

      <div class="field">
        <label for="password">contraseña</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>

      <button type="submit" class="btn-primary">entrar</button>

      <div class="links">
        <a href="#">¿olvidaste tu contraseña?</a>
        <span>·</span>
        <a href="#">crear cuenta</a>
      </div>
    </form>
  </main>

  <script src="app.js"></script>
</body>
</html>
